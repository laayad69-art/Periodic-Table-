<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>⚛ الجدول الدوري | Eyad Alaa</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Oxanium:wght@300;400;600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --cell:56px;--gap:3px;
  --bg:#02040e;
  --c-alkali:#ff4d6d;
  --c-alkaline:#ff9f1c;
  --c-lanthanide:#c77dff;
  --c-actinide:#ff4891;
  --c-transition:#4cc9f0;
  --c-post:#2ec4b6;
  --c-metalloid:#a8dadc;
  --c-nonmetal:#ffd60a;
  --c-halogen:#06d6a0;
  --c-noble:#b5179e;
}
html,body{height:100%;overflow-x:hidden;background:var(--bg);font-family:'Cairo',sans-serif;color:#e2e8f0}

/* ── CANVAS BG ── */
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── SCAN LINE ── */
body::before{
  content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,255,.007) 2px,rgba(0,255,255,.007) 4px);
}

/* ── WRAP ── */
#app{position:relative;z-index:2;padding:20px 12px 60px;width:100%}

/* ── HEADER ── */
header{text-align:center;margin-bottom:20px;animation:fadeDown .9s both}
.badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(76,201,240,.06);border:1px solid rgba(76,201,240,.15);
  border-radius:20px;padding:4px 16px;font-size:10px;
  color:rgba(76,201,240,.6);font-family:'Oxanium',sans-serif;
  letter-spacing:3px;margin-bottom:12px;
}
.badge i{width:6px;height:6px;border-radius:50%;background:#4cc9f0;box-shadow:0 0 8px #4cc9f0;animation:blink 1.8s infinite}
h1{
  font-family:'Oxanium',sans-serif;
  font-size:clamp(22px,5vw,52px);font-weight:800;line-height:1;
  background:linear-gradient(135deg,#c77dff 0%,#4cc9f0 45%,#06d6a0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-size:200%;animation:gshift 5s ease infinite alternate;
  padding:4px 0;
}
header p{color:rgba(255,255,255,.3);font-size:clamp(10px,2vw,13px);margin-top:6px;letter-spacing:.3px}

/* ── CONTROLS ── */
.ctrls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px;animation:fadeUp .6s .25s both}
.sw{position:relative;display:flex;align-items:center}
.si{position:absolute;right:12px;opacity:.35;font-size:14px;pointer-events:none}
input#q{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;color:#e2e8f0;
  padding:9px 36px 9px 14px;direction:rtl;
  font-family:'Cairo',sans-serif;font-size:clamp(12px,3vw,14px);
  outline:none;width:clamp(170px,45vw,250px);transition:all .25s;
}
input#q:focus{border-color:#4cc9f088;box-shadow:0 0 0 3px #4cc9f015;background:rgba(76,201,240,.05)}
input#q::placeholder{color:rgba(255,255,255,.22)}
.btn{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.6);border-radius:11px;
  padding:9px 15px;cursor:pointer;
  font-family:'Cairo',sans-serif;font-size:clamp(11px,2.5vw,13px);
  transition:all .2s;white-space:nowrap;
}
.btn:hover,.btn:active{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2)}
.btn.on{background:rgba(76,201,240,.12);border-color:#4cc9f040;color:#4cc9f0}
#vbtn{display:none}

/* ── LEGEND ── */
.legend{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:18px;animation:fadeUp .6s .35s both}
.leg{
  border-radius:50px;padding:4px 12px;font-size:clamp(9px,2vw,11px);
  cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;
  transition:all .22s;border:1px solid;
}
.leg:hover{transform:scale(1.1) translateY(-2px);filter:brightness(1.2)}

/* ── TABLE SCALE CONTAINER ── */
#ptOuter{overflow:visible}
#ptWrap{
  display:inline-block;
  transform-origin:top center;
  transition:transform .25s;
}

/* ── THE GRID ── */
#pt{
  display:grid;
  grid-template-columns:repeat(18,var(--cell));
  grid-template-rows:repeat(7,var(--cell)) 12px var(--cell) var(--cell);
  gap:var(--gap);
}

/* ── ELEMENT CELL ── */
.el{
  border-radius:7px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  border:1px solid transparent;
  overflow:hidden;
  opacity:0;transform:scale(.55);
  transition:
    opacity .45s,transform .45s cubic-bezier(.34,1.56,.64,1),
    box-shadow .2s,filter .2s;
  will-change:transform;
}
.el.vis{opacity:1;transform:scale(1)}
.el::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(145deg,rgba(255,255,255,.09) 0%,transparent 55%);
  pointer-events:none;z-index:1;
}
.el::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  border-radius:0 0 6px 6px;
  pointer-events:none;z-index:2;
}
/* Category bottom-accent */
.el[data-cat=alkali]::after{background:var(--c-alkali)}
.el[data-cat=alkaline]::after{background:var(--c-alkaline)}
.el[data-cat=lanthanide]::after{background:var(--c-lanthanide)}
.el[data-cat=actinide]::after{background:var(--c-actinide)}
.el[data-cat=transition]::after{background:var(--c-transition)}
.el[data-cat=post-transition]::after{background:var(--c-post)}
.el[data-cat=metalloid]::after{background:var(--c-metalloid)}
.el[data-cat=nonmetal]::after{background:var(--c-nonmetal)}
.el[data-cat=halogen]::after{background:var(--c-halogen)}
.el[data-cat=noble]::after{background:var(--c-noble)}

.el.dim{opacity:.07!important;filter:grayscale(1) blur(.5px)}
.el.xhl{filter:brightness(1.4)!important;opacity:1!important}

.el .en{position:absolute;top:4px;left:5px;font-family:'Oxanium',sans-serif;font-size:8.5px;line-height:1;opacity:.7;z-index:3}
.el .es{font-family:'Oxanium',sans-serif;font-weight:800;font-size:17.5px;line-height:1;z-index:3}
.el .ea{font-size:7.5px;color:rgba(255,255,255,.5);line-height:1.3;margin-top:2px;z-index:3;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.el .em{font-size:7px;color:rgba(255,255,255,.25);z-index:3;margin-top:1px}

/* Series labels in main grid */
.slbl{
  display:flex;align-items:center;justify-content:center;
  font-size:9.5px;font-weight:700;opacity:.55;font-family:'Oxanium',sans-serif;
  letter-spacing:.5px;border-radius:6px;border:1px dashed;cursor:default;
}

/* F-block labels (cols 1-2 in lanthanide/actinide rows) */
.flab{
  display:flex;align-items:center;justify-content:center;
  font-family:'Oxanium',sans-serif;font-size:8px;opacity:.3;
  letter-spacing:.5px;writing-mode:horizontal-tb;
}

/* ── CARD VIEW ── */
#cards{display:none;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;padding:2px}
#cards.on{display:grid}
.card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:13px;padding:12px 8px;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(145deg,rgba(255,255,255,.06),transparent);pointer-events:none}
.card:active{transform:scale(.95)}
.card .csym{font-size:28px;font-weight:800;font-family:'Oxanium',sans-serif;line-height:1}
.card .car{font-size:11px;color:rgba(255,255,255,.55)}
.card .cnum{font-size:9px;font-family:'Oxanium',sans-serif;opacity:.4}
.card .ccat{font-size:8px;border-radius:10px;padding:1px 7px;border:1px solid;margin-top:2px;font-weight:700}
.card.dim{opacity:.07;filter:grayscale(1)}

/* ── TOOLTIP ── */
#tip{
  position:fixed;background:rgba(2,4,14,.95);
  border:1px solid rgba(255,255,255,.1);border-radius:9px;
  padding:6px 12px;font-size:12px;pointer-events:none;
  z-index:300;white-space:nowrap;backdrop-filter:blur(20px);
  box-shadow:0 8px 32px rgba(0,0,0,.6);transition:opacity .12s;opacity:0;
}

/* ── MODAL ── */
.ov{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:none;align-items:flex-end;justify-content:center;
  z-index:600;backdrop-filter:blur(20px);padding:0;
}
.ov.on{display:flex;animation:fadeIn .2s}
@media(min-width:600px){.ov{align-items:center;padding:16px}}
.modal{
  background:linear-gradient(165deg,#080d1e,#0b1030);
  border:1px solid rgba(255,255,255,.1);
  border-radius:24px 24px 0 0;
  width:100%;max-width:520px;
  max-height:92dvh;overflow-y:auto;
  padding:20px;position:relative;
  box-shadow:0 -20px 80px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.07);
  animation:slideUp .35s cubic-bezier(.34,1.4,.64,1);
}
@media(min-width:600px){
  .modal{border-radius:24px;max-height:88dvh;animation:popIn .32s cubic-bezier(.34,1.4,.64,1)}
}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.mglow{position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:0;opacity:.3}
.modal>*:not(.mglow){position:relative;z-index:1}
/* drag handle */
.handle{
  width:40px;height:4px;border-radius:4px;
  background:rgba(255,255,255,.2);margin:0 auto 16px;
}
@media(min-width:600px){.handle{display:none}}
.mclose{
  position:absolute;top:16px;left:16px;z-index:10;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  color:#e2e8f0;width:32px;height:32px;border-radius:50%;
  cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.mclose:hover,.mclose:active{background:rgba(255,60,60,.2);color:#ff6b6b;border-color:rgba(255,60,60,.3)}
.mhdr{display:flex;gap:16px;align-items:flex-start;flex-direction:row-reverse;margin-bottom:20px;clear:both}
.mhero{
  width:clamp(82px,18vw,96px);height:clamp(82px,18vw,96px);
  border-radius:16px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:2px solid;position:relative;overflow:hidden;
}
.mhero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent)}
.mhero .hn{font-size:10px;font-family:'Oxanium',sans-serif;opacity:.65}
.mhero .hs{font-size:clamp(30px,8vw,40px);font-weight:800;font-family:'Oxanium',sans-serif;line-height:1}
.mhero .hm{font-size:10px;opacity:.45;font-family:'Space Mono',monospace}
.mmeta h2{font-size:clamp(18px,5vw,24px);font-weight:900;color:#fff;margin-bottom:4px}
.mmeta .men{font-size:11px;color:rgba(255,255,255,.28);font-family:'Oxanium',sans-serif;direction:ltr;margin-bottom:9px}
.mpill{display:inline-block;border-radius:20px;padding:4px 14px;font-size:11px;font-weight:700;border:1px solid}
#ecv{display:block;margin:0 auto 18px;max-width:200px;width:100%;aspect-ratio:1;border-radius:50%}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:380px){.stats{grid-template-columns:1fr}}
.stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:11px;padding:10px 13px;transition:background .2s}
.stat:hover,.stat:active{background:rgba(255,255,255,.08)}
.stat .sk{font-size:9.5px;color:rgba(255,255,255,.32);display:block;margin-bottom:3px}
.stat .sv{font-size:clamp(12px,3vw,14px);font-weight:700;font-family:'Oxanium',sans-serif;direction:ltr;display:block}

/* ── FOOTER ── */
footer{text-align:center;margin-top:36px;animation:fadeUp .7s 1.2s both}
.devcard{
  display:inline-flex;align-items:center;gap:14px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:16px;padding:14px 24px;backdrop-filter:blur(10px);
  position:relative;overflow:hidden;
}
.devcard::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(76,201,240,.05) 40%,rgba(199,125,255,.05) 60%,transparent 100%);
  animation:shimmer 3.5s linear infinite;background-size:200% 100%;
}
.aicon{font-size:24px;animation:spin8 10s linear infinite}
.dname{font-size:clamp(15px,4vw,19px);font-weight:800;font-family:'Oxanium',sans-serif;
  background:linear-gradient(135deg,#c77dff,#4cc9f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dtag{font-size:9px;color:rgba(255,255,255,.2);font-family:'Space Mono',monospace;letter-spacing:1px;margin-top:1px}
.dlabel{font-size:10px;color:rgba(255,255,255,.28)}

/* ── KEYFRAMES ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-22px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:scale(.84) translateY(20px)}to{opacity:1;transform:none}}
@keyframes gshift{from{background-position:0%}to{background-position:200%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
@keyframes spin8{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes shimmer{from{background-position:-200% 0}to{background-position:200% 0}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.08);opacity:1}}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:rgba(255,255,255,.02)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="app">

  <header>
    <div class="badge"><i></i>INTERACTIVE PERIODIC TABLE v3.0</div>
    <h1>الجدول الدوري للعناصر</h1>
    <p>⚛ 118 عنصراً كيميائياً — اضغط على أي عنصر لاستكشاف تفاصيله</p>
  </header>

  <div class="ctrls">
    <div class="sw"><span class="si">🔍</span><input id="q" type="text" placeholder="ابحث بالاسم أو الرمز أو الرقم..."></div>
    <button class="btn" onclick="resetAll()">↺ إعادة</button>
    <button class="btn on" id="gbtn" onclick="toggleGlow()">✦ توهج</button>
    <button class="btn" id="vbtn" onclick="toggleView()">⊞ بطاقات</button>
  </div>

  <div class="legend" id="legend"></div>

  <!-- TABLE -->
  <div id="ptOuter">
    <div id="ptWrap">
      <div id="pt"></div>
    </div>
  </div>

  <!-- CARDS -->
  <div id="cards"></div>

  <footer>
    <div class="devcard">
      <span class="aicon">⚛</span>
      <div>
        <div class="dlabel">تصميم وتطوير</div>
        <div class="dname">Eyad Alaa</div>
        <div class="dtag">CHEMISTRY × CODE × DESIGN</div>
      </div>
    </div>
  </footer>
</div>

<div id="tip"></div>

<div class="ov" id="ov" onclick="ovClick(event)">
  <div class="modal" id="modal">
    <div class="mglow" id="mglow"></div>
    <div class="handle"></div>
    <button class="mclose" onclick="closeModal()">✕</button>
    <div class="mhdr">
      <div class="mhero" id="mhero">
        <span class="hn" id="mhn"></span>
        <span class="hs" id="mhs"></span>
        <span class="hm" id="mhm"></span>
      </div>
      <div class="mmeta">
        <h2 id="mar"></h2>
        <div class="men" id="men"></div>
        <span class="mpill" id="mpill"></span>
      </div>
    </div>
    <canvas id="ecv" width="200" height="200"></canvas>
    <div class="stats" id="mstats"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════
// PARTICLE NETWORK BACKGROUND
// ═══════════════════════════════════
(()=>{
  const cv=document.getElementById('bg');
  const ctx=cv.getContext('2d');
  let W,H,pts=[];
  const N=120,DIST=130;
  const resize=()=>{
    W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;
    pts=Array.from({length:N},()=>({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
      r:Math.random()*1.6+.3,
      h:Math.floor(Math.random()*60)+200
    }));
  };
  resize();window.addEventListener('resize',resize);
  const draw=()=>{
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<N;i++){
      const a=pts[i];a.x+=a.vx;a.y+=a.vy;
      if(a.x<0||a.x>W)a.vx*=-1;
      if(a.y<0||a.y>H)a.vy*=-1;
      for(let j=i+1;j<N;j++){
        const b=pts[j];
        const dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<DIST){
          ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
          ctx.strokeStyle=`hsla(${(a.h+b.h)/2},80%,70%,${.18*(1-d/DIST)})`;
          ctx.lineWidth=.6;ctx.stroke();
        }
      }
      ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${a.h},80%,75%,.55)`;ctx.fill();
    }
    requestAnimationFrame(draw);
  };draw();
})();

// ═══════════════════════════════════
// CATEGORY META
// ═══════════════════════════════════
const CAT={
  alkali:           {c:'#ff4d6d',g:'#cc0033',l:'فلزات قلوية'},
  alkaline:         {c:'#ff9f1c',g:'#cc7a00',l:'فلزات قلوية ترابية'},
  lanthanide:       {c:'#c77dff',g:'#7b2d8b',l:'لانثانيدات'},
  actinide:         {c:'#ff4891',g:'#99004d',l:'أكتينيدات'},
  transition:       {c:'#4cc9f0',g:'#0077aa',l:'فلزات انتقالية'},
  'post-transition':{c:'#2ec4b6',g:'#007a72',l:'فلزات ما بعد الانتقالية'},
  metalloid:        {c:'#a8dadc',g:'#406b70',l:'أشباه فلزات'},
  nonmetal:         {c:'#ffd60a',g:'#996600',l:'لافلزات'},
  halogen:          {c:'#06d6a0',g:'#007a4d',l:'هالوجينات'},
  noble:            {c:'#b5179e',g:'#5c0055',l:'غازات نبيلة'},
};

// ═══════════════════════════════════
// ELEMENT DATA  (g=grid-col, p=grid-row)
// LANTHANIDES: p=9, cols 3-17
// ACTINIDES:   p=10, cols 3-17
// ═══════════════════════════════════
const EL=[
  {n:1,  sym:'H', name:'Hydrogen',      ar:'هيدروجين',     mass:'1.008', cat:'nonmetal',        g:1, p:1, e:'1s¹',               mp:-259,  bp:-253,  disc:1766},
  {n:2,  sym:'He',name:'Helium',        ar:'هيليوم',       mass:'4.003', cat:'noble',            g:18,p:1, e:'1s²',               mp:-272,  bp:-269,  disc:1868},
  {n:3,  sym:'Li',name:'Lithium',       ar:'ليثيوم',       mass:'6.941', cat:'alkali',           g:1, p:2, e:'[He] 2s¹',          mp:180,   bp:1342,  disc:1817},
  {n:4,  sym:'Be',name:'Beryllium',     ar:'بيريليوم',     mass:'9.012', cat:'alkaline',         g:2, p:2, e:'[He] 2s²',          mp:1287,  bp:2469,  disc:1798},
  {n:5,  sym:'B', name:'Boron',         ar:'بورون',        mass:'10.81', cat:'metalloid',        g:13,p:2, e:'[He] 2s² 2p¹',      mp:2077,  bp:4000,  disc:1808},

// ═══════════════════════════════════
// LEGEND
// ═══════════════════════════════════
let aFilter='all',hovCat=null,glowOn=true,cardMode=false;
const legEl=document.getElementById('legend');
Object.entries(CAT).forEach(([cat,{c,l}])=>{
  const b=document.createElement('button');
  b.className='leg';b.dataset.cat=cat;b.textContent=l;
  b.style.cssText=`color:${c};border-color:${c}44;background:${c}12`;
  b.addEventListener('mouseenter',()=>{hovCat=cat;applyFilter()});
  b.addEventListener('mouseleave',()=>{hovCat=null;applyFilter()});
  b.addEventListener('click',()=>{aFilter=aFilter===cat?'all':cat;refreshLegs();applyFilter()});
  legEl.appendChild(b);
});
function refreshLegs(){
  document.querySelectorAll('.leg').forEach(b=>{
    const{c}=CAT[b.dataset.cat];
    b.style.background=aFilter===b.dataset.cat?c:`${c}12`;
    b.style.color=aFilter===b.dataset.cat?'#000':c;
  });
}

// ═══════════════════════════════════
// BUILD TABLE
// ═══════════════════════════════════
const byPos={};
EL.forEach(e=>byPos[`${e.p}-${e.g}`]=e);
const ptEl=document.getElementById('pt');
const tip=document.getElementById('tip');
let tipTO;

// Grid: rows 1-7 (main), row 8 (gap auto 12px), rows 9-10 (f-block)
for(let row=1;row<=10;row++){
  for(let col=1;col<=18;col++){
    if(row===8){if(col>1)continue;// only create one cell spanning all cols for gap
      // gap row: just skip, CSS grid handles height via grid-template-rows
      const sp=document.createElement('div');
      sp.style.cssText=`grid-column:1/19;grid-row:8`;
      // Add dashed line between main and f-block with labels
      sp.style.cssText+=`;display:flex;align-items:center;justify-content:center;gap:4px;opacity:.35`;
      sp.innerHTML=`<span style="flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(199,125,255,.4) 20%,rgba(76,201,240,.4) 80%,transparent)"></span>
        <span style="font-size:8px;font-family:Oxanium,sans-serif;color:rgba(255,255,255,.4);white-space:nowrap;letter-spacing:1px">f-BLOCK</span>
        <span style="flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(76,201,240,.4) 20%,rgba(199,125,255,.4) 80%,transparent)"></span>`;
      ptEl.appendChild(sp);
      break;
    }
    const el=byPos[`${row}-${col}`];
    const div=document.createElement('div');
    div.style.gridColumn=col;div.style.gridRow=row;
    if(!el){
      if(row===6&&col===3){
        div.className='slbl';
        div.style.cssText=`grid-column:3;grid-row:6;color:${CAT.lanthanide.c};border-color:${CAT.lanthanide.c}44;font-size:9px`;
        div.textContent='La–Lu';
      } else if(row===7&&col===3){
        div.className='slbl';
        div.style.cssText=`grid-column:3;grid-row:7;color:${CAT.actinide.c};border-color:${CAT.actinide.c}44;font-size:9px`;
        div.textContent='Ac–Lr';
      }
      ptEl.appendChild(div);continue;
    }
    const{c,g:glow}=CAT[el.cat]||{c:'#888',g:'#444'};
    div.className='el';
    div.dataset.n=String(el.n);div.dataset.cat=el.cat;
    div.dataset.sym=el.sym.toLowerCase();div.dataset.name=el.name.toLowerCase();
    div.dataset.ar=el.ar;div.dataset.row=row;div.dataset.col=col;
    div.style.background=`linear-gradient(150deg,${c}1e,${c}08)`;
    div.style.borderColor=`${c}44`;
    if(glowOn)div.style.boxShadow=`0 0 10px ${glow}20,inset 0 1px 0 rgba(255,255,255,.06)`;
    div.innerHTML=`
      <span class="en" style="color:${c}99">${el.n}</span>
      <span class="es" style="color:${c};text-shadow:0 0 14px ${glow}cc">${el.sym}</span>
      <span class="ea">${el.ar}</span>
      <span class="em">${el.mass}</span>`;
    div.style.transitionDelay=(((row-1)*18+(col-1))*4.5)+'ms';
    // 3D tilt
    div.addEventListener('mousemove',e=>{
      const r=div.getBoundingClientRect();
      const x=(e.clientX-r.left)/r.width-.5;
      const y=(e.clientY-r.top)/r.height-.5;
      div.style.transform=`scale(1.18) perspective(300px) rotateX(${-y*22}deg) rotateY(${x*22}deg) translateZ(8px)`;
    });
    div.addEventListener('mouseenter',e=>{
      clearTimeout(tipTO);
      tip.innerHTML=`<b style="color:${c}">${el.sym}</b> &mdash; ${el.ar} <span style="opacity:.45;font-family:Oxanium,sans-serif">(${el.name})</span>`;
      tip.style.opacity='1';moveTip(e);
      // Crosshair highlight
      const rr=div.dataset.row,cc=div.dataset.col;
      document.querySelectorAll('.el').forEach(d=>{
        if(d===div)return;
        if(d.dataset.row===rr||d.dataset.col===cc)d.classList.add('xhl');
      });
    });
    div.addEventListener('mousemove',moveTip);
    div.addEventListener('mouseleave',()=>{
      div.style.transform='';
      clearTimeout(tipTO);tipTO=setTimeout(()=>tip.style.opacity='0',80);
      document.querySelectorAll('.el.xhl').forEach(d=>d.classList.remove('xhl'));
    });
    div.addEventListener('click',()=>openModal(el));
    ptEl.appendChild(div);
  }
}
function moveTip(e){
  tip.style.left=Math.min(e.clientX+14,window.innerWidth-200)+'px';
  tip.style.top=Math.max(4,e.clientY-40)+'px';
}

// ═══════════════════════════════════
// STAGGERED ENTRANCE
// ═══════════════════════════════════
setTimeout(()=>document.querySelectorAll('.el').forEach(c=>c.classList.add('vis')),80);

// ═══════════════════════════════════
// BUILD CARD VIEW
// ═══════════════════════════════════
const cardsEl=document.getElementById('cards');
[...EL].sort((a,b)=>a.n-b.n).forEach(el=>{
  const{c,l}=CAT[el.cat]||{c:'#888',l:''};
  const d=document.createElement('div');
  d.className='card';d.dataset.n=String(el.n);
  d.dataset.cat=el.cat;d.dataset.sym=el.sym.toLowerCase();
  d.dataset.name=el.name.toLowerCase();d.dataset.ar=el.ar;
  d.style.borderColor=`${c}2a`;d.style.background=`linear-gradient(150deg,${c}0f,${c}05)`;
  d.innerHTML=`
    <span class="csym" style="color:${c};text-shadow:0 0 12px ${c}66">${el.sym}</span>
    <span class="car">${el.ar}</span>
    <span class="cnum" style="color:${c}77">#${el.n}</span>
    <span class="ccat" style="color:${c};border-color:${c}33;background:${c}12">${l}</span>`;
  d.addEventListener('click',()=>openModal(el));
  cardsEl.appendChild(d);
});

// ═══════════════════════════════════
// RESPONSIVE SCALING
// ═══════════════════════════════════
const CELL=56,GAP=3;
const NATURAL_W=18*CELL+17*GAP; // 1059

function fitTable(){
  const wrap=document.getElementById('ptWrap');
  const outer=document.getElementById('ptOuter');
  const avail=Math.min(window.innerWidth-24, NATURAL_W);
  const scale=avail/NATURAL_W;
  wrap.style.transform=`scale(${scale})`;
  wrap.style.transformOrigin='top center';
  // compensate layout height
  const nh=wrap.offsetHeight;
  outer.style.height=Math.ceil(nh*scale)+'px';
  // show/hide view toggle
  document.getElementById('vbtn').style.display=window.innerWidth<700?'block':'none';
  // auto card mode on tiny screens
  if(window.innerWidth<400&&!cardMode){cardMode=true;applyViewMode()}
}
fitTable();
let rzTO;
window.addEventListener('resize',()=>{clearTimeout(rzTO);rzTO=setTimeout(fitTable,100)});

// ═══════════════════════════════════
// FILTER
// ═══════════════════════════════════
function applyFilter(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const check=d=>q
    ?(d.dataset.sym.includes(q)||d.dataset.name.includes(q)||d.dataset.ar.includes(q)||d.dataset.n.includes(q))
    :hovCat?d.dataset.cat===hovCat
    :aFilter!=='all'?d.dataset.cat===aFilter
    :true;
  document.querySelectorAll('.el').forEach(d=>d.classList.toggle('dim',!check(d)));
  document.querySelectorAll('.card').forEach(d=>d.classList.toggle('dim',!check(d)));
}
document.getElementById('q').addEventListener('input',applyFilter);
function resetAll(){
  document.getElementById('q').value='';
  aFilter='all';hovCat=null;refreshLegs();applyFilter();
}

// ═══════════════════════════════════
// GLOW TOGGLE
// ═══════════════════════════════════
function toggleGlow(){
  glowOn=!glowOn;
  document.querySelectorAll('.el').forEach(d=>{
    const{g}=CAT[d.dataset.cat]||{g:'#444'};
    d.style.boxShadow=glowOn?`0 0 10px ${g}20,inset 0 1px 0 rgba(255,255,255,.06)`:'none';
  });
  document.getElementById('gbtn').classList.toggle('on',glowOn);
}

// ═══════════════════════════════════
// VIEW TOGGLE
// ═══════════════════════════════════
function toggleView(){
  cardMode=!cardMode;applyViewMode();
}
function applyViewMode(){
  const tv=document.getElementById('ptOuter');
  const cv=document.getElementById('cards');
  const vb=document.getElementById('vbtn');
  tv.style.display=cardMode?'none':'block';
  cv.classList.toggle('on',cardMode);
  vb.textContent=cardMode?'⊟ جدول':'⊞ بطاقات';
}

// ═══════════════════════════════════
// MODAL
// ═══════════════════════════════════
let raf=null;

function openModal(el){
  const{c,g,l}=CAT[el.cat]||{c:'#888',g:'#444',l:''};
  const hero=document.getElementById('mhero');
  hero.style.cssText=`border-color:${c};background:linear-gradient(145deg,${c}22,${c}08);box-shadow:0 0 40px ${g}55`;
  document.getElementById('mhn').style.color=c;document.getElementById('mhn').textContent=el.n;
  document.getElementById('mhs').style.cssText=`color:${c};text-shadow:0 0 25px ${g}`;
  document.getElementById('mhs').textContent=el.sym;
  document.getElementById('mhm').textContent=el.mass;
  document.getElementById('mglow').style.background=`radial-gradient(circle at 30% 30%,${c}1a,transparent 65%)`;
  document.getElementById('mar').textContent=el.ar;
  document.getElementById('men').textContent=el.name;
  const pill=document.getElementById('mpill');
  pill.textContent=l;pill.style.cssText=`color:${c};border-color:${c}44;background:${c}15`;
  const per=el.p>=9?(el.p===9?'لانثانيدات (دورة 6)':'أكتينيدات (دورة 7)'):String(el.p);
  const discStr=el.disc<0?`قديم جداً (~${Math.abs(el.disc)} ق.م)`:String(el.disc);
  document.getElementById('mstats').innerHTML=[
    ['⚛ الرقم الذري',el.n],['⚖ الكتلة الذرية',el.mass+' g/mol'],
    ['📐 المجموعة',el.g],['🔄 الدورة',per],
    ['💫 التهيئة الإلكترونية',el.e],
    ['🌡 نقطة الانصهار',el.mp!==null?el.mp+'°C':'—'],
    ['💧 نقطة الغليان',el.bp!==null?el.bp+'°C':'—'],
    ['📅 سنة الاكتشاف',discStr],
  ].map(([k,v])=>`<div class="stat"><span class="sk">${k}</span><span class="sv" style="color:${c}">${v}</span></div>`).join('');
  startAtom(el.n,c,g);
  document.getElementById('ov').classList.add('on');
  document.body.style.overflow='hidden';
}

function startAtom(n,color,glow){
  const cv=document.getElementById('ecv');
  const size=Math.min(200,window.innerWidth*.45);
  cv.width=cv.height=size;
  const ctx=cv.getContext('2d');
  const cx=size/2,cy=size/2;
  const ms=[2,8,18,32,32,18,8];
  const shells=[];let rem=n;
  for(let i=0;i<ms.length&&rem>0;i++){shells.push(Math.min(rem,ms[i]));rem-=shells.at(-1);}
  const ns=shells.length;
  const maxR=cx*.88;
  const radii=shells.map((_,i)=>14+(i+1)*(maxR-14)/ns);
  const angles=shells.map((c,i)=>Array.from({length:c},(_,j)=>(j/c)*Math.PI*2+(i*.8)));
  const speeds=shells.map((_,i)=>.014/(i*.35+1)*(i%2?-1:1));
  const trails=shells.map(c=>Array.from({length:c},()=>[]));
  if(raf)cancelAnimationFrame(raf);
  const frame=()=>{
    ctx.clearRect(0,0,size,size);
    // Deep glow bg
    const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,cx);
    bg.addColorStop(0,color+'0d');bg.addColorStop(1,'transparent');
    ctx.fillStyle=bg;ctx.fillRect(0,0,size,size);
    // Orbit rings with tilt illusion
    shells.forEach((_,si)=>{
      ctx.save();ctx.translate(cx,cy);ctx.rotate(si*.5);
      ctx.beginPath();
      ctx.ellipse(0,0,radii[si],radii[si]*(.55+.45*(si%2)),0,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=.8;ctx.stroke();
      ctx.restore();
    });
    // Nucleus
    const ng=ctx.createRadialGradient(cx,cy,0,cx,cy,13);
    ng.addColorStop(0,'#fff');ng.addColorStop(.45,color);ng.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(cx,cy,12,0,Math.PI*2);ctx.fillStyle=ng;ctx.fill();
    const puls=9+6*Math.sin(Date.now()*.0028);
    const pg=ctx.createRadialGradient(cx,cy,10,cx,cy,puls+14);
    pg.addColorStop(0,color+'44');pg.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(cx,cy,puls+14,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();
    // Electrons on tilted ellipses
    shells.forEach((cnt,si)=>{
      const tiltB=radii[si]*(.55+.45*(si%2));
      const tiltA=radii[si];
      const rot=si*.5;
      for(let ei=0;ei<cnt;ei++){
        angles[si][ei]+=speeds[si];
        const a=angles[si][ei];
        const lx=Math.cos(a)*tiltA,ly=Math.sin(a)*tiltB;
        const ex=cx+Math.cos(rot)*lx-Math.sin(rot)*ly;
        const ey=cy+Math.sin(rot)*lx+Math.cos(rot)*ly;
        trails[si][ei].push({x:ex,y:ey});
        if(trails[si][ei].length>11)trails[si][ei].shift();
        trails[si][ei].forEach((pt,ti)=>{
          const aa=(ti/trails[si][ei].length)*.38;
          const hex=Math.floor(aa*255).toString(16).padStart(2,'0');
          ctx.beginPath();ctx.arc(pt.x,pt.y,1.3,0,Math.PI*2);
          ctx.fillStyle=color+hex;ctx.fill();
        });
        const eg=ctx.createRadialGradient(ex,ey,0,ex,ey,6);
        eg.addColorStop(0,color+'ff');eg.addColorStop(1,'transparent');
        ctx.beginPath();ctx.arc(ex,ey,6,0,Math.PI*2);ctx.fillStyle=eg;ctx.fill();
        ctx.beginPath();ctx.arc(ex,ey,2.5,0,Math.PI*2);
        ctx.fillStyle='#fff';ctx.shadowColor=color;ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
      }
    });
    raf=requestAnimationFrame(frame);
  };frame();
}
function closeModal(){
  document.getElementById('ov').classList.remove('on');
  document.body.style.overflow='';
  if(raf){cancelAnimationFrame(raf);raf=null;}
}
function ovClick(e){if(e.target===document.getElementById('ov'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
